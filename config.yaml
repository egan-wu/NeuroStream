# NeuroStream system configuration.
# Hardware constants and policy defaults. Per-experiment variables live in
# scenarios/*.yaml — see docs/scenario-schema.md (Phase 2).

ssd:
  raw_bandwidth_mbps: 5500          # PS5-class raw read bandwidth
  effective_bandwidth_mbps: 8500    # post-Kraken effective throughput
  decompress_ratio: 2.0             # average compression ratio
  decompress_latency_us: 5          # per-block decompression latency

bus:
  total_bandwidth_mbps: 16000       # shared system bus bandwidth
  transaction_overhead_us: 1        # per-transaction arbitration cost

npu:
  cores: 4                          # Phase 8: number of execution units
  shared_cache_mb: 512              # shared weight cache size

audio:
  rate_mbps: 5
  packet_bytes: 256
  deadline_us: 1000                 # 1 ms hard deadline
  priority: critical

texture:
  burst_rate_mbps: 500
  burst_duration_ms: 100
  block_bytes: 262144              # 256 KB streaming granularity
  priority: normal

ai_weights:
  # LOD = function tier (not quality grade):
  #   LOD0 = dialogue LLM
  #   LOD1 = behavior / reaction NN
  #   LOD2 = bark / expression NN
  # See Design_Detail Phase 4 for full rationale.
  lod0_mb: 100
  lod1_mb: 30
  lod2_mb: 10
  priority: high

lod_manager:
  tick_us: 16667                    # 60 Hz LOD evaluation
  hysteresis_pct: 20                # deadband width as % of band max
  bands:
    - { lod: 0, max_distance_m: 10 }
    - { lod: 1, max_distance_m: 30 }
    - { lod: 2, max_distance_m: 100 }
  # NPCs beyond the last band's max_distance_m get no LOD (FSM-only,
  # no weight load).

predictor:
  policy: intent                    # one of: scripted | lod | intent

intent_predictor:
  # Frustum field-of-view (full cone width in degrees). 120 ≈ typical
  # third-person camera.
  fov_deg: 120
  # Linear extrapolation horizon for "where will this NPC be soon".
  look_ahead_ms: 500
  # Thresholds (re-used from lod_manager.bands implicitly: close/near/visible).
  # Override here if the intent predictor needs different values from the
  # distance-only LodPredictor.
  close_m: 10                       # LOD0 candidate distance
  near_m: 30                        # LOD1 candidate distance
  visible_m: 100                    # LOD2 candidate distance
  stopped_dist_m: 5.0               # "stopped near NPC" distance
  stopped_speed_m_s: 1.0            # player speed below which counts as stopped

scheduler:
  policy: qos                       # one of: fifo | qos
  quantum_us: 100                   # re-arbitration granularity
  critical_rate_limit_pct: 5        # token-bucket cap on critical class
  bulk_weights:                     # weighted-fair within bulk tier
    high: 2                         # weight class (AI weights)
    normal: 1                       # texture class

compression:
  # Decompression path for weight and texture transfers.
  # Audio uses its own codecs (Opus/AAC) and is unaffected by this.
  #   none      — uncompressed; bus carries raw bytes (today's baseline)
  #   cpu       — bus carries compressed; CPU decompresses (slow software)
  #   inline_hw — bus carries compressed; hardware decompressor (PS5 Kraken)
  path: inline_hw
  weight_ratio: 2.0                 # Zstd on quantized weights
  texture_ratio: 2.0                # Kraken / BCn-class textures
  cpu:
    decompress_cycles_per_byte: 5         # KPI cycle counter (story)
    decompress_bandwidth_mbps: 1500       # service-time bottleneck (~1.5 GB/s Zstd)
  inline_hw:
    decompressor_bw_mbps: 16000     # Kraken-class throughput
    setup_cost_cycles: 1000         # descriptor build (no CPU on payload)

dma:
  # Path used for SSD → NPU weight transfers. Audio and texture have
  # their own DMA engines and are unaffected by this switch.
  path: neuro_dma                   # one of: bounce | neuro_dma
  bounce:
    # CPU-driven memcpy bandwidth (representative console-class single-
    # thread STREAM Triad). Reality: 10–15 GB/s on Zen 2/3 + DDR4/GDDR6.
    memcpy_bandwidth_mbps: 12000
    cycles_per_byte: 3              # CPU cycles burned per memcpy'd byte
  neuro_dma:
    # SGL entry size drives the scheduler quantum on this path.
    # 1 MB → 62.5 µs at 16 GB/s → finer preemption than bounce's 100 µs.
    sgl_entry_bytes: 1048576
    setup_cost_cycles: 1000         # SGL descriptor build (one-shot per txn)

eviction:
  policy: distance_lru              # Phase 8: distance-weighted LRU

degradation:
  weight_load_timeout_ms: 50        # fall back to previous LOD on timeout

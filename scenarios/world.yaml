name: world
duration_ms: 5000

# Open-world traversal: 10 NPCs at varied distances. Only 2 ever come close
# enough to need LOD0; most stay in LOD2 or LOD1 range. This is where
# LodPredictor's bandwidth savings versus ScriptedPredictor become visible —
# scripted loads all 10 at LOD0 (1000 MB), lod loads ~2 LOD0 + 3 LOD1 + 5 LOD2
# (~340 MB).

audio:
  enabled: true

# A single mid-game texture burst.
texture_bursts:
  - at_ms: 2500
    rate_mbps: 500
    duration_ms: 100

npcs:
  # Quest companions — come into LOD0 range
  - id: 1
    waypoints:
      - { at_ms: 0,    distance_m: 30 }
      - { at_ms: 2000, distance_m: 5  }
      - { at_ms: 5000, distance_m: 5  }
  - id: 2
    waypoints:
      - { at_ms: 0,    distance_m: 25 }
      - { at_ms: 3000, distance_m: 8  }

  # Combat-range NPCs (LOD1 mostly)
  - id: 3
    waypoints:
      - { at_ms: 0,    distance_m: 25 }
      - { at_ms: 5000, distance_m: 22 }
  - id: 4
    waypoints:
      - { at_ms: 0,    distance_m: 28 }
      - { at_ms: 5000, distance_m: 28 }
  - id: 5
    waypoints:
      - { at_ms: 0,    distance_m: 20 }
      - { at_ms: 5000, distance_m: 25 }

  # Distant ambient NPCs (LOD2)
  - id: 6
    waypoints: [ { at_ms: 0, distance_m: 80 }, { at_ms: 5000, distance_m: 75 } ]
  - id: 7
    waypoints: [ { at_ms: 0, distance_m: 60 }, { at_ms: 5000, distance_m: 65 } ]
  - id: 8
    waypoints: [ { at_ms: 0, distance_m: 90 }, { at_ms: 5000, distance_m: 95 } ]
  - id: 9
    waypoints: [ { at_ms: 0, distance_m: 70 }, { at_ms: 5000, distance_m: 72 } ]
  - id: 10
    waypoints: [ { at_ms: 0, distance_m: 85 }, { at_ms: 5000, distance_m: 80 } ]

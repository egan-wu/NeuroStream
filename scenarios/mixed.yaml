schema_version: 3
name: mixed
duration_ms: 3000

# Heterogeneous NPC set designed to hit every cascade rule (1..8) of the
# IntentPredictor. Player walks east for 2s, then stops for 1s.
#   Rule 1 (quest)         — NPC 10 (quest), 50m east (far, would normally be LOD2)
#   Rule 2 (interact)      — NPC 20 at 40m, interaction window [500ms, 1500ms]
#   Rule 3 (stopped+near)  — NPC 30 at (1, 0): in front, very close, after t=2000 player is stopped
#   Rule 4 (frustum+close) — NPC 40 at (8, 0): in front, < close_m, while player is moving
#   Rule 5 (approaching)   — NPC 50 rushes from 25m to 4m by t=1500
#   Rule 6 (frustum+near)  — NPC 60 at (25, 0): in frustum, near range, stationary
#   Rule 7 (visible only)  — NPC 70 at (-50, 0): behind player, outside frustum, within visible_m
#   Rule 8 (out of range)  — NPC 80 at (300, 0): beyond visible_m, no LOD

audio: { enabled: true }

player:
  waypoints:
    - { at_ms: 0,    pos: { x: 0, y: 0 }, facing_deg: 0 }
    - { at_ms: 2000, pos: { x: 0, y: 0 }, facing_deg: 0 }   # actually stop where we are
    - { at_ms: 3000, pos: { x: 0, y: 0 }, facing_deg: 0 }

texture_bursts:
  - { at_ms: 1000, rate_mbps: 500, duration_ms: 100 }

interactions:
  - { at_ms: 500, npc_id: 20, duration_ms: 1000 }

npcs:
  - id: 10
    priority: quest
    waypoints: [ { at_ms: 0, pos: { x: 50, y: 0 } } ]
  - id: 20
    waypoints: [ { at_ms: 0, pos: { x: 40, y: 0 } } ]
  - id: 30
    waypoints: [ { at_ms: 0, pos: { x: 1,  y: 0 } } ]
  - id: 40
    waypoints: [ { at_ms: 0, pos: { x: 8,  y: 0 } } ]
  - id: 50
    waypoints:
      - { at_ms: 0,    pos: { x: 25, y: 0 } }
      - { at_ms: 1500, pos: { x:  4, y: 0 } }
  - id: 60
    waypoints: [ { at_ms: 0, pos: { x: 25, y: 0 } } ]
  - id: 70
    waypoints: [ { at_ms: 0, pos: { x: -50, y: 0 } } ]
  - id: 80
    waypoints: [ { at_ms: 0, pos: { x: 300, y: 0 } } ]

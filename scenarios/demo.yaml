schema_version: 3
name: demo
duration_ms: 5000

audio:
  enabled: true

# Player walks east along y=0 for the duration.
player:
  waypoints:
    - { at_ms: 0,    pos: {x: 0,  y: 0}, facing_deg: 0 }
    - { at_ms: 5000, pos: {x: 50, y: 0}, facing_deg: 0 }

texture_bursts:
  - { at_ms: 1000, rate_mbps: 500, duration_ms: 100 }

# Two NPCs. NPC 5 enters LOD0 range mid-scenario; NPC 7 stays in LOD2.
npcs:
  - id: 5
    waypoints:
      - { at_ms: 0,    pos: {x: 60, y: 5} }   # ~60m east, slightly off-line
      - { at_ms: 5000, pos: {x: 50, y: 0} }   # ends right next to the player
  - id: 7
    waypoints:
      - { at_ms: 0,    pos: {x: 30, y: 50} }  # far off the player's path
      - { at_ms: 5000, pos: {x: 60, y: 60} }

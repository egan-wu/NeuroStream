name: stress
duration_ms: 2000

# Combat-burst stress test: overlapping LOD0 weight loads (10 NPCs entering
# combat range simultaneously) plus a sustained texture burst, racing against
# the audio stream. This is where FIFO falls behind QoS.
audio:
  enabled: true

texture_bursts:
  - at_ms: 500
    rate_mbps: 500
    duration_ms: 500

weight_prefetches:
  - { at_ms: 500, npc_id: 1,  lod: 0 }
  - { at_ms: 500, npc_id: 2,  lod: 0 }
  - { at_ms: 500, npc_id: 3,  lod: 0 }
  - { at_ms: 500, npc_id: 4,  lod: 0 }
  - { at_ms: 500, npc_id: 5,  lod: 0 }
  - { at_ms: 510, npc_id: 6,  lod: 0 }
  - { at_ms: 510, npc_id: 7,  lod: 0 }
  - { at_ms: 510, npc_id: 8,  lod: 0 }
  - { at_ms: 510, npc_id: 9,  lod: 0 }
  - { at_ms: 510, npc_id: 10, lod: 0 }

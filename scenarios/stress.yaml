name: stress
duration_ms: 2000

# Combat-burst stress test: 10 NPCs all rush into LOD0 (combat) range at
# roughly the same time, alongside a sustained texture burst, racing against
# the audio stream. This is where FIFO falls behind QoS.
#
# Under LodPredictor, the simultaneous distance-crossings produce a burst of
# weight prefetches around t≈500 ms. Under ScriptedPredictor (baseline), all
# 10 LOD0 prefetches fire at t=0 — even more punishing for audio.

audio:
  enabled: true

texture_bursts:
  - at_ms: 500
    rate_mbps: 500
    duration_ms: 500

npcs:
  - id: 1
    waypoints:
      - { at_ms: 0,   distance_m: 80 }
      - { at_ms: 500, distance_m: 5  }
  - id: 2
    waypoints:
      - { at_ms: 0,   distance_m: 80 }
      - { at_ms: 500, distance_m: 5  }
  - id: 3
    waypoints:
      - { at_ms: 0,   distance_m: 80 }
      - { at_ms: 500, distance_m: 5  }
  - id: 4
    waypoints:
      - { at_ms: 0,   distance_m: 80 }
      - { at_ms: 500, distance_m: 5  }
  - id: 5
    waypoints:
      - { at_ms: 0,   distance_m: 80 }
      - { at_ms: 500, distance_m: 5  }
  - id: 6
    waypoints:
      - { at_ms: 0,   distance_m: 80 }

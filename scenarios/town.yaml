schema_version: 3
name: town
duration_ms: 8000

# §5b case study: player walks through a town of 20 NPCs without interacting.
# Distance-only LOD would load LOD0 for every NPC passed within 10m.
# IntentPredictor with frustum + velocity should NOT load LOD0 because the
# player never stops or faces any NPC — they're all just passing-by ambient.

audio: { enabled: true }

# Player walks east along y=0, 8 seconds, 50m east.
player:
  waypoints:
    - { at_ms: 0,    pos: {x:  0, y: 0}, facing_deg: 0 }
    - { at_ms: 8000, pos: {x: 80, y: 0}, facing_deg: 0 }

# 20 NPCs lining the street, alternating sides.
npcs:
  - id: 1
    waypoints: [ { at_ms: 0, pos: {x:  5,  y:  4} } ]
  - id: 2
    waypoints: [ { at_ms: 0, pos: {x:  8,  y: -3} } ]
